version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Validating Lambda function..."

  build:
    commands:
      - python -m py_compile lambda_function.py
      - echo "Build completed successfully."

artifacts:
  files:
    - lambda_function.py
    - requirements.txt